<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagon Spray for Cockroach Janata Party</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <h1>Cockroach Janata Party</h1>

        <p>
            Join the movement. Become a founding member today.
        </p>

        <form id="joinForm">

            <input
                type="text"
                placeholder="First Name"
                id="firstName"
                required
            >

            <input
                type="text"
                placeholder="Last Name"
                id="lastName"
                required
            >

            <input
                type="email"
                placeholder="Email Address"
                id="email"
                required
            >

            <input
                type="tel"
                placeholder="WhatsApp Number"
                id="whatsapp"
                required
            >

            <button type="submit">
                Join The Movement
            </button>

        </form>

        <div id="message"></div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
